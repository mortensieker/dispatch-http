name: Release

on:
  push:
    tags: [v*]

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-22.04
          - platform: darwin/universal
            os: macos-latest
          - platform: windows/amd64
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build
        run: wails build -platform ${{ matrix.platform }} -ldflags "-X main.version=${{ github.ref_name }}"
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Sign macOS app
        if: runner.os == 'macOS'
        run: |
          cat > /tmp/entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.network.client</key>
              <true/>
              <key>com.apple.security.network.server</key>
              <true/>
          </dict>
          </plist>
          EOF
          codesign --deep --force --sign - --entitlements /tmp/entitlements.plist build/bin/dispatch.app

      - name: Package
        shell: bash
        run: |
          cd build/bin
          zip -r "../../dispatch-${{ matrix.os }}.zip" .

      - uses: softprops/action-gh-release@v2
        with:
          files: dispatch-${{ matrix.os }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
